name: Translate Cron

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch:  # manual trigger

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger translation cron
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "X-Internal-Key: ${{ secrets.VIP_PATH }}" \
            "${{ secrets.APP_URL }}/internal/cron/translate")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" != "200" ]; then
            echo "::warning::Translation cron returned $http_code"
          fi
